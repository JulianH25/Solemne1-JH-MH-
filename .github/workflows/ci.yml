name: CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar uv
        run: pip install uv

      - name: Instalar dependencias
        run: uv sync

      - name: Instalar Chromium
        run: uv run playwright install chromium
        
      - name: Instalar dependencias Chromium
        run: uv run playwright install-deps chromium

      - name: Linting
        run: uv run ruff check .

      - name: Ejecutar tests
        run: uv run pytest test_main.py -v

      - name: Build imagen Docker
        run: docker build -t solemne1 .

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push imagen Docker Hub
        run: |
          docker tag solemne1 ${{ secrets.DOCKER_USERNAME }}/solemne1:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/solemne1:latest